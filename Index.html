<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generador DOCX</title>

<!-- LIBRERÍAS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pizzip@3.1.4/dist/pizzip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docxtemplater@3.37.11/build/docxtemplater.js"></script>

</head>

<body>

<h2>Generador Word desde Excel</h2>

<input type="file" id="excel" accept=".xlsx"><br><br>
<input type="file" id="word" accept=".docx"><br><br>

<button onclick="generar()">Generar</button>

<script>
async function generar() {

  const excelFile = document.getElementById("excel").files[0];
  const wordFile = document.getElementById("word").files[0];

  if (!excelFile || !wordFile) {
    alert("Sube ambos archivos");
    return;
  }

  // ✅ VALIDAR LIBRERÍAS
  if (typeof Docxtemplater === 'undefined') {
    alert("Docxtemplater no cargó");
    return;
  }

  if (typeof PizZip === 'undefined') {
    alert("PizZip no cargó");
    return;
  }

  // ✅ LEER EXCEL
  const excelBuffer = await excelFile.arrayBuffer();
  const workbook = XLSX.read(excelBuffer, { type: "array" });
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const data = XLSX.utils.sheet_to_json(sheet);

  // ✅ LEER WORD
  const wordBuffer = await wordFile.arrayBuffer();

  const zipSalida = new JSZip();

  for (let i = 0; i < data.length; i++) {

    try {

      const fila = {};

      // normalizar keys a minúsculas
      Object.keys(data[i]).forEach(k => {
        fila[k.toLowerCase()] = data[i][k];
      });

      const zip = new PizZip(wordBuffer);

      const doc = new Docxtemplater(zip, {
        paragraphLoop: true,
        linebreaks: true
      });

      // ✅ RENDER
      doc.render(fila);

      const blob = doc.getZip().generate({
        type: "blob",
        mimeType:
          "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
      });

      const nombre = (fila.poliza || ("doc_" + (i + 1))) + ".docx";

      zipSalida.file(nombre, blob);

    } catch (error) {

      console.log("ERROR DETALLE:", error);
      console.log("PROPERTIES:", error.properties);

      alert("Error en fila " + (i + 1) + ": " + error.message);
      return;
    }
  }

  // ✅ DESCARGA ZIP
  const contenido = await zipSalida.generateAsync({ type: "blob" });

  const link = document.createElement("a");
  link.href = URL.createObjectURL(contenido);
  link.download = "documentos.zip";
  link.click();
}
</script>

</body>
</html>
