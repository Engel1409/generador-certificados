<!DOCTYPE html>
<html class="staticrypt-html">
<head>
<meta charset="utf-8" />
<title>Acceso seguro</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- No cache -->
<meta http-equiv="cache-control" content="no-cache" />
<meta http-equiv="expires" content="0" />
<meta http-equiv="pragma" content="no-cache" />

<style>
.hidden { display: none !important; }
</style>
</head>

<body>

<!-- LOADING -->
<div id="staticrypt_loading" class="min-h-screen flex items-center justify-center bg-gray-900">
    <div class="animate-spin h-10 w-10 border-4 border-white border-t-transparent rounded-full"></div>
</div>

<!-- CONTENIDO -->
<div id="staticrypt_content" class="hidden min-h-screen flex items-center justify-center bg-gradient-to-br from-green-500 to-green-800">

  <div class="bg-white/90 backdrop-blur-lg shadow-2xl rounded-xl p-8 w-full max-w-md">

    <h1 class="text-2xl font-semibold text-center mb-2">
      🔒 Acceso seguro
    </h1>

    <p class="text-sm text-gray-500 text-center mb-6">
      Ingresa tu contraseña para continuar
    </p>

    <form id="staticrypt-form" class="space-y-4">

      <div class="relative">
        <input id="staticrypt-password"
               type="password"
               placeholder="Contraseña"
               class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-green-500 outline-none"
               autofocus />

        <button type="button" id="toggle-eye"
          class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">
          👁️
        </button>
      </div>

      <p id="error-msg" class="text-red-500 text-sm hidden">
        ❌ Contraseña incorrecta
      </p>

      <label id="staticrypt-remember-label" class="hidden flex items-center text-sm text-gray-600">
        <input id="staticrypt-remember" type="checkbox" class="mr-2">
        Mantener sesión en este dispositivo
      </label>

      <input type="submit"
             id="decrypt-btn"
             value="Acceder"
             class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-lg transition cursor-pointer disabled:opacity-60">

    </form>
  </div>
</div>

<script>
/* ===============================
   STATICRYPT CORE (NO TOCAR)
================================ */
</script>

<!-- ✅ PEGA AQUÍ TU SCRIPT ORIGINAL ENTERO (desde staticryptInitiator hasta init)
     EXACTAMENTE el que ya tienes -->
     
<script>
/* ===============================
   SOLO MEJORAS UX (SEGURO)
================================ */

// Toggle contraseña
document.getElementById("toggle-eye").addEventListener("click", () => {
    const input = document.getElementById("staticrypt-password");
    input.type = input.type === "password" ? "text" : "password";
});

// Submit mejorado
document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {
    e.preventDefault();

    const btn = document.getElementById("decrypt-btn");
    const error = document.getElementById("error-msg");

    const password = document.getElementById("staticrypt-password").value;
    const remember = document.getElementById("staticrypt-remember").checked;

    btn.value = "Validando...";
    btn.disabled = true;
    error.classList.add("hidden");

    const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, remember);

    if (!isSuccessful) {
        btn.value = "Acceder";
        btn.disabled = false;
        error.classList.remove("hidden");
    }
});
</script>

</body>
</html>
