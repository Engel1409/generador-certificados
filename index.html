<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Certificados — Word + ZIP</title>
    
    <script src="libs/xlsx.full.min.js"></script>
    <script src="libs/jszip.min.js"></script>
    <script src="libs/pizzip.min.js"></script>
    <script src="libs/docxtemplater.js"></script>
    <script src="js/app.js" defer></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen">

    <div class="container mx-auto p-6 max-w-5xl">
        <header class="bg-white rounded-xl shadow-md p-6 mb-6 border-l-4 border-red-600 flex items-center justify-between gap-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Generador de Certificados Masivos</h1>
                <p class="text-gray-600 text-sm mt-1">Entorno de ejecución Local detectado — VSC.</p>
            </div>
            <button type="button" id="btnLimpiar" class="shrink-0 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-semibold py-2 px-4 rounded-md border border-gray-300 transition duration-200 cursor-pointer">
                ↺ Limpiar / Nuevo lote
            </button>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white rounded-xl shadow-md p-6 md:col-span-1 h-fit">
                <h2 class="text-lg font-semibold text-gray-700 mb-4 border-b pb-2 flex items-center gap-2">
                    <span class="bg-red-600 text-white rounded-full w-5 h-5 text-xs flex items-center justify-center font-bold">1</span>
                    Cargar Archivos
                </h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider">Excel de Datos (.xlsx)</label>
                        <input type="file" id="inputExcel" accept=".xlsx" class="w-full mt-1 text-sm p-2 border rounded-md bg-gray-50 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text-xs file:font-semibold file:bg-gray-200 file:text-gray-700 hover:file:bg-gray-300">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider">Plantilla Word (.docx)</label>
                        <input type="file" id="inputWord" accept=".docx" class="w-full mt-1 text-sm p-2 border rounded-md bg-gray-50 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text-xs file:font-semibold file:bg-gray-200 file:text-gray-700 hover:file:bg-gray-300">
                    </div>
                    
                    <button type="button" id="btnAnalizar" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-md transition duration-200 cursor-pointer">
                        Analizar Estructura
                    </button>
                </div>
            </div>

            <div class="md:col-span-2 space-y-6">
                <div id="seccionDiagnostico" class="bg-white rounded-xl shadow-md p-6" hidden>
                    <h2 class="text-lg font-semibold text-gray-700 mb-4 border-b pb-2 flex items-center gap-2">
                        <span class="bg-red-600 text-white rounded-full w-5 h-5 text-xs flex items-center justify-center font-bold">2</span>
                        Mapeo Detectado
                    </h2>
                    <div id="tablaColumnas" class="max-h-60 overflow-y-auto border border-gray-100 rounded-md p-2 bg-gray-50 text-sm font-mono text-gray-700"></div>
                    <div id="estadoGeneral" class="mt-4 p-3 rounded-lg text-sm font-semibold bg-green-50 text-green-700 border border-green-200"></div>
                </div>

                <div id="seccionGenerar" class="bg-white rounded-xl shadow-md p-6" hidden>
                    <h2 class="text-lg font-semibold text-gray-700 mb-3 border-b pb-2 flex items-center gap-2">
                        <span class="bg-red-600 text-white rounded-full w-5 h-5 text-xs flex items-center justify-center font-bold">3</span>
                        Emisión Masiva Certificados
                    </h2>
                    <p id="infoFilas" class="text-sm text-gray-600 mb-4"></p>

                    <div class="space-y-3">

                        <!-- BOTONES -->
                        <div class="flex flex-col sm:flex-row gap-3">

                            <button id="btnGenerar" 
                                class="w-full sm:w-auto bg-gray-800 hover:bg-gray-900 text-white font-bold py-2.5 px-6 rounded-md transition duration-200 flex items-center justify-center gap-2 cursor-pointer shadow">
                                Generar Certificados (.ZIP)
                            </button>

                            <a href="https://mapfrecorp.sharepoint.com/:u:/r/sites/GO365EECOMPUSGLTSPE-EMISNYRENOVAC/Documentos%20compartidos/Equipo_Masivos/Renovaciones%20del%20%C3%81rea/SEGUIMIENTO/automation/convertir-pdf.zip?csf=1&web=1&e=6ac0fN" 
                                download="convertir.vbs"
                                target="_blank"
                                class="w-full sm:w-auto bg-red-600 hover:bg-red-700 text-white font-bold py-2.5 px-6 rounded-md transition duration-200 flex items-center justify-center gap-2 cursor-pointer shadow text-center">
                                📥 Descargar Convertidor (VBS)
                            </a>

                        </div>

                        <!-- PROGRESO -->
                        <div class="w-full bg-gray-200 h-2.5 rounded-full overflow-hidden">
                            <div id="barraProgreso" class="bg-red-600 h-full w-0 transition-all duration-150"></div>
                        </div>

                        <div id="estadoTexto" class="text-xs text-gray-500 font-medium min-h-[16px]"></div>
                        <div id="log" class="text-xs text-red-600 font-mono max-h-32 overflow-y-auto mt-1"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
