<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Acceso seguro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<style>
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}
</style>
</head>

<body class="bg-gradient-to-br from-green-500 to-green-800">

<!-- LOADING -->
<div id="staticrypt_loading" class="flex items-center justify-center h-screen">
  <div class="animate-spin rounded-full h-10 w-10 border-4 border-white border-t-transparent"></div>
</div>

<!-- CONTENIDO -->
<div id="staticrypt_content" class="hidden min-h-screen flex items-center justify-center">

  <div class="bg-white/90 backdrop-blur-lg shadow-2xl rounded-xl p-8 w-full max-w-md transition-all duration-300">

    <h1 class="text-2xl font-semibold text-center mb-2">
      🔒 Acceso seguro
    </h1>

    <p class="text-sm text-gray-500 text-center mb-6">
      Ingresa tu contraseña para continuar
    </p>

    <!-- FORM -->
    <form id="staticrypt-form" class="space-y-4">

      <div class="relative">
        <input id="staticrypt-password"
               type="password"
               placeholder="Contraseña"
               class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-green-500 outline-none"
               autofocus>

        <button type="button" id="toggle-eye"
          class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">
          👁️
        </button>
      </div>

      <p id="error-msg" class="text-red-500 text-sm hidden">
        ❌ Contraseña incorrecta
      </p>

      <label class="flex items-center text-sm text-gray-600">
        <input type="checkbox" id="staticrypt-remember" class="mr-2">
        Mantener sesión en este dispositivo
      </label>

      <input type="submit"
             id="decrypt-btn"
             value="Acceder"
             class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-lg transition cursor-pointer disabled:opacity-60">
    </form>

  </div>
</div>

<script>
/* ===============================
   CONFIG STATICRYPT (PEGADO ORIGINAL)
================================ */
const staticryptInitiator = window.staticryptInitiator || (function(){ return {}; })();
</script>

<!-- ⚠️ IMPORTANTE:
PEGAR AQUÍ TODO TU SCRIPT ORIGINAL DE Staticrypt
(desde const staticryptInitiator = ... hasta el init)
NO LO MODIFIQUES
-->

<script>
/* ===============================
   UX INTERACTION LAYER
================================ */

// Mostrar contenido si no auto-login
window.onload = async function () {
    const { isSuccessful } = await staticrypt.handleDecryptOnLoad();

    if (!isSuccessful) {
        document.getElementById("staticrypt_loading").classList.add("hidden");
        document.getElementById("staticrypt_content").classList.remove("hidden");
        document.getElementById("staticrypt-password").focus();
    }
};

// Toggle password
document.getElementById("toggle-eye").addEventListener("click", () => {
    const input = document.getElementById("staticrypt-password");
    input.type = input.type === "password" ? "text" : "password";
});

// Submit mejorado
document.getElementById("staticrypt-form")
.addEventListener("submit", async function (e) {
    e.preventDefault();

    const btn = document.getElementById("decrypt-btn");
    const error = document.getElementById("error-msg");
    const form = document.querySelector("form");

    const password = document.getElementById("staticrypt-password").value;
    const remember = document.getElementById("staticrypt-remember").checked;

    btn.value = "Validando...";
    btn.disabled = true;
    error.classList.add("hidden");

    const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, remember);

    if (!isSuccessful) {
        btn.value = "Acceder";
        btn.disabled = false;

        error.classList.remove("hidden");

        form.style.animation = "shake 0.3s";
        setTimeout(() => form.style.animation = "", 300);
    }
});
</script>

</body>
</html>
